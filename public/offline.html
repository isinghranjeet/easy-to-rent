<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Offline — EasyToRent</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      background: #0a0a0a;
      color: #fff;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 24px;
    }
    .container {
      text-align: center;
      max-width: 360px;
    }
    .icon {
      width: 80px;
      height: 80px;
      margin: 0 auto 24px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      border-radius: 24px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 40px;
    }
    h1 {
      font-size: 24px;
      font-weight: 700;
      margin-bottom: 8px;
    }
    p {
      color: #a1a1aa;
      font-size: 15px;
      line-height: 1.6;
      margin-bottom: 24px;
    }
    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 12px 24px;
      background: linear-gradient(135deg, #f97316, #ea580c);
      color: #fff;
      border: none;
      border-radius: 12px;
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      text-decoration: none;
      transition: transform 0.2s, box-shadow 0.2s;
    }
    .btn:hover {
      transform: translateY(-2px);
      box-shadow: 0 8px 24px rgba(249, 115, 22, 0.3);
    }
    .cached-note {
      margin-top: 20px;
      padding: 12px 16px;
      background: rgba(255,255,255,0.05);
      border-radius: 12px;
      font-size: 13px;
      color: #71717a;
    }
  </style>
</head>
<body>
  <div class="container">
    <div class="icon">📴</div>
    <h1>You're Offline</h1>
    <p>It looks like your internet connection is down. Don't worry — your previously viewed PG listings are still available.</p>
    <a href="/" class="btn">Try Again</a>
    <div class="cached-note">
      💡 Tip: Browse pages you've visited before — they'll load instantly even without internet.
    </div>
  </div>
</body>
</html>
