<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <!-- SECURITY & TRUST -->
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <meta name="referrer" content="strict-origin-when-cross-origin" />

    <!-- GOOGLE VERIFICATION -->
    <meta name="google-site-verification" content="PASTE_YOUR_CODE_HERE" />

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/ranjeet.png" />
    <link rel="apple-touch-icon" href="/ranjeet.png" />

    <!-- SEO -->
    <title>EassyToRent | Premium PG & Rooms Near Chandigarh University</title>
    <meta name="description" content="Find verified PGs near Chandigarh University. Zero brokerage, instant booking. Trusted by 5000+ students." />
    <meta name="author" content="Ranjeet Singh" />
    <meta name="keywords" content="PG near Chandigarh University, hostel, paying guest, rooms for rent, student accommodation" />
    <meta name="robots" content="index, follow" />

    <!-- OPEN GRAPH -->
    <meta property="og:title" content="EassyToRent - Find Your Perfect PG" />
    <meta property="og:description" content="Zero brokerage. Verified listings. Easy booking near Chandigarh University." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.easytorent.in" />
    <meta property="og:image" content="https://www.easytorent.in/og-image.jpg" />

    <!-- PWA SUPPORT -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- CRITICAL STYLES - Only for boot screen -->
    <style>
      /* Reset - Only minimum needed */
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      /* BOOT SCREEN - Only visible during initial load */
      #boot-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        background: linear-gradient(135deg, #0a0a0a 0%, #1a1a1a 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.5s ease-out;
      }

      /* Hide boot screen completely */
      #boot-screen.hide-boot {
        opacity: 0;
        visibility: hidden;
        pointer-events: none;
      }

      /* Remove boot screen from DOM */
      #boot-screen.removed {
        display: none !important;
      }

      .boot-content {
        text-align: center;
        animation: bootFadeIn 0.5s ease-out;
      }

      .boot-logo {
        width: 130px;
        height: 130px;
        object-fit: contain;
        animation: bootPop 0.6s cubic-bezier(0.34, 1.2, 0.64, 1);
        filter: drop-shadow(0 0 30px rgba(249, 115, 22, 0.4));
      }

      .boot-brand {
        font-size: 32px;
        font-weight: 800;
        margin-top: 20px;
        background: linear-gradient(135deg, #FFFFFF 0%, #f97316 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        letter-spacing: -0.5px;
      }

      .boot-tagline {
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        margin-top: 8px;
        letter-spacing: 1px;
      }

      .boot-loader {
        display: flex;
        justify-content: center;
        gap: 8px;
        margin-top: 30px;
      }

      .boot-dot {
        width: 8px;
        height: 8px;
        background: #f97316;
        border-radius: 50%;
        animation: bootBounce 1.2s ease-in-out infinite;
      }

      .boot-dot:nth-child(2) { animation-delay: 0.2s; }
      .boot-dot:nth-child(3) { animation-delay: 0.4s; }

      /* Animations */
      @keyframes bootFadeIn {
        from { opacity: 0; transform: scale(0.95); }
        to { opacity: 1; transform: scale(1); }
      }

      @keyframes bootPop {
        from { transform: scale(0.6); opacity: 0; }
        to { transform: scale(1); opacity: 1; }
      }

      @keyframes bootBounce {
        0%, 80%, 100% { transform: scale(0.6); opacity: 0.3; }
        40% { transform: scale(1.2); opacity: 1; }
      }

      /* Mobile optimization */
      @media (max-width: 768px) {
        .boot-logo { width: 100px; height: 100px; }
        .boot-brand { font-size: 24px; }
      }
    </style>
  </head>

  <body>
    <!-- BOOT SCREEN - Will be completely removed after load -->
    <div id="boot-screen">
      <div class="boot-content">
        <img src="/ranjeet.png" alt="EassyToRent" class="boot-logo" />
        <div class="boot-brand">EassyToRent</div>
        <div class="boot-tagline">Premium PG Finder</div>
        <div class="boot-loader">
          <div class="boot-dot"></div>
          <div class="boot-dot"></div>
          <div class="boot-dot"></div>
        </div>
      </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <!-- Main React Entry -->
    <script type="module" src="/src/main.tsx"></script>

    <!-- BOOT SCREEN CONTROL - Completely removes it after load -->
    <script>
      (function() {
        const BOOT_KEY = 'easytorent_boot_seen';
        const bootScreen = document.getElementById('boot-screen');
        const root = document.getElementById('root');
        
        // Function to completely remove boot screen from DOM
        function removeBootScreen() {
          if (!bootScreen) return;
          
          // Add hide class for fade out
          bootScreen.classList.add('hide-boot');
          
          // Remove from DOM after animation
          setTimeout(() => {
            if (bootScreen && bootScreen.parentNode) {
              bootScreen.classList.add('removed');
              bootScreen.style.display = 'none';
              // Completely remove from DOM to free memory
              bootScreen.remove();
            }
          }, 500);
        }
        
        // Check if user has seen boot screen before
        const hasSeenBoot = localStorage.getItem(BOOT_KEY);
        
        if (hasSeenBoot) {
          // Returning user - remove boot screen immediately
          if (bootScreen) {
            bootScreen.style.display = 'none';
            bootScreen.remove();
          }
          if (root) {
            root.style.opacity = '1';
          }
        } else {
          // First time - show boot screen then remove
          window.addEventListener('load', function() {
            setTimeout(function() {
              removeBootScreen();
              localStorage.setItem(BOOT_KEY, 'true');
            }, 2000);
          });
        }
        
        // Safety fallback - remove after 4 seconds max
        setTimeout(function() {
          if (bootScreen && bootScreen.style.display !== 'none') {
            removeBootScreen();
            if (!localStorage.getItem(BOOT_KEY)) {
              localStorage.setItem(BOOT_KEY, 'true');
            }
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
