<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover" />

    <meta http-equiv="X-UA-Compatible" content="IE=edge" />

    <!-- GOOGLE VERIFICATION -->

    <!-- FAVICON -->
    <link rel="icon" type="image/png" href="/ranjeet.png" />
    <link rel="apple-touch-icon" href="/ranjeet.png" />

    <!-- SEO -->
    <title>EassyToRent | Premium PG & Rooms Near Chandigarh University</title>
    <meta name="description" content="Find verified PGs near Chandigarh University. Zero brokerage, instant booking. Trusted by 5000+ students." />
    <meta name="author" content="Ranjeet Singh" />
    <meta name="keywords" content="PG near Chandigarh University, hostel, paying guest, rooms for rent, student accommodation" />
    <meta name="robots" content="index, follow" />

    <!-- OPEN GRAPH -->
    <meta property="og:title" content="EassyToRent - Find Your Perfect PG" />
    <meta property="og:description" content="Zero brokerage. Verified listings. Easy booking near Chandigarh University." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://www.easytorent.in" />
    <meta property="og:image" content="https://www.easytorent.in/og-image.jpg" />

    <!-- PWA SUPPORT -->
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#f97316" />
    <meta name="mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />

    <!-- FONTS -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&display=swap" rel="stylesheet" />

    <!-- PREMIUM BOOT SCREEN STYLES -->
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }

      body {
        font-family: 'Inter', sans-serif;
        background: #0a0a0a;
        overflow: hidden;
      }

      /* Premium Boot Screen */
      #boot-screen {
        position: fixed;
        top: 0;
        left: 0;
        right: 0;
        bottom: 0;
        width: 100%;
        height: 100%;
        background: radial-gradient(circle at center, #0a0a0a 0%, #000000 100%);
        display: flex;
        align-items: center;
        justify-content: center;
        z-index: 99999;
        transition: opacity 0.6s cubic-bezier(0.4, 0, 0.2, 1);
      }

      #boot-screen.hide {
        opacity: 0;
        pointer-events: none;
      }

      /* Animated Background */
      #boot-screen::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(125deg, 
          rgba(249, 115, 22, 0.15) 0%,
          rgba(249, 115, 22, 0.05) 30%,
          transparent 70%);
        animation: bootBgShift 8s ease-in-out infinite;
      }

      @keyframes bootBgShift {
        0%, 100% { opacity: 0.5; transform: scale(1); }
        50% { opacity: 1; transform: scale(1.05); }
      }

      .boot-content {
        text-align: center;
        position: relative;
        z-index: 2;
      }

      /* Logo Animation - Cinematic Zoom */
      .boot-logo-wrapper {
        animation: bootLogoContainer 0.8s cubic-bezier(0.34, 1.2, 0.64, 1);
      }

      .boot-logo {
        width: 160px;
        height: 160px;
        object-fit: contain;
        filter: drop-shadow(0 0 40px rgba(249, 115, 22, 0.6));
        animation: bootLogoGlow 2s ease-in-out infinite;
      }

      @keyframes bootLogoContainer {
        0% {
          transform: scale(0.3) rotate(-10deg);
          opacity: 0;
        }
        50% {
          transform: scale(1.05);
        }
        100% {
          transform: scale(1) rotate(0deg);
          opacity: 1;
        }
      }

      @keyframes bootLogoGlow {
        0%, 100% {
          filter: drop-shadow(0 0 20px rgba(249, 115, 22, 0.4));
        }
        50% {
          filter: drop-shadow(0 0 50px rgba(249, 115, 22, 0.8));
        }
      }

      /* Netflix Style Brand Text */
      .boot-brand {
        margin-top: 32px;
        overflow: hidden;
      }

      .brand-letter {
        display: inline-block;
        font-size: 48px;
        font-weight: 800;
        background: linear-gradient(135deg, #FFFFFF 0%, #f97316 50%, #FF8C00 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        opacity: 0;
        transform: translateY(30px);
        filter: blur(10px);
        animation: bootLetterReveal 0.4s forwards;
      }

      @keyframes bootLetterReveal {
        to {
          opacity: 1;
          transform: translateY(0);
          filter: blur(0px);
        }
      }

      /* Tagline */
      .boot-tagline {
        margin-top: 16px;
        color: rgba(255, 255, 255, 0.5);
        font-size: 12px;
        letter-spacing: 3px;
        text-transform: uppercase;
        opacity: 0;
        animation: bootFadeUp 0.5s ease-out 1.2s forwards;
      }

      @keyframes bootFadeUp {
        to {
          opacity: 1;
          transform: translateY(0);
        }
        from {
          opacity: 0;
          transform: translateY(20px);
        }
      }

      /* Premium Loader */
      .boot-loader {
        display: flex;
        justify-content: center;
        gap: 12px;
        margin-top: 48px;
      }

      .boot-loader-line {
        width: 40px;
        height: 2px;
        background: rgba(249, 115, 22, 0.2);
        border-radius: 2px;
        overflow: hidden;
        position: relative;
      }

      .boot-loader-line::before {
        content: '';
        position: absolute;
        top: 0;
        left: -100%;
        width: 100%;
        height: 100%;
        background: linear-gradient(90deg, transparent, #f97316, transparent);
        animation: bootLoaderProgress 1.5s ease-in-out infinite;
      }

      @keyframes bootLoaderProgress {
        0% { left: -100%; }
        100% { left: 100%; }
      }

      /* Loading Percentage */
      .boot-percentage {
        margin-top: 16px;
        color: rgba(249, 115, 22, 0.8);
        font-size: 12px;
        font-weight: 500;
        font-family: monospace;
        letter-spacing: 1px;
      }

      /* Particle Effects */
      .boot-particle {
        position: absolute;
        width: 2px;
        height: 2px;
        background: #f97316;
        border-radius: 50%;
        opacity: 0;
        animation: bootParticle 4s ease-in-out infinite;
      }

      @keyframes bootParticle {
        0% {
          opacity: 0;
          transform: translateY(0) translateX(0);
        }
        20% {
          opacity: 0.8;
        }
        100% {
          opacity: 0;
          transform: translateY(-100px) translateX(var(--dx));
        }
      }

      /* Root element */
      #root {
        opacity: 0;
        transition: opacity 0.4s ease-in-out;
      }

      #root.ready {
        opacity: 1;
      }

      /* Mobile */
      @media (max-width: 768px) {
        .boot-logo { width: 100px; height: 100px; }
        .brand-letter { font-size: 32px; }
        .boot-loader-line { width: 30px; }
      }
    </style>
  </head>

  <body>
    <!-- PREMIUM BOOT SCREEN -->
    <div id="boot-screen">
      <!-- Floating Particles -->
      <div id="boot-particles"></div>
      
      <div class="boot-content">
        <div class="boot-logo-wrapper">
          <img src="/ranjeet.png" alt="EassyToRent" class="boot-logo" />
        </div>
        
        <div class="boot-brand" id="boot-brand">
          <!-- Letters will be injected via JS -->
        </div>
        
        <div class="boot-tagline">Premium PG Finder</div>
        
        <div class="boot-loader">
          <div class="boot-loader-line"></div>
          <div class="boot-loader-line"></div>
          <div class="boot-loader-line"></div>
        </div>
        
        <div class="boot-percentage" id="boot-percentage">0%</div>
      </div>
    </div>

    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>

    <!-- Enhanced Boot Screen Script -->
    <script>
      (function() {
        const BOOT_KEY = 'easytorent_boot_seen';
        const bootScreen = document.getElementById('boot-screen');
        const brandContainer = document.getElementById('boot-brand');
        const percentageEl = document.getElementById('boot-percentage');
        const brandName = 'EasyToRent';
        
        // Create Netflix-style letter animation
        if (brandContainer) {
          brandName.split('').forEach((char, index) => {
            const span = document.createElement('span');
            span.className = 'brand-letter';
            span.textContent = char;
            span.style.animationDelay = `${0.3 + index * 0.05}s`;
            brandContainer.appendChild(span);
          });
        }
        
        // Create floating particles
        const particlesContainer = document.getElementById('boot-particles');
        for (let i = 0; i < 30; i++) {
          const particle = document.createElement('div');
          particle.className = 'boot-particle';
          const size = Math.random() * 3 + 1;
          particle.style.width = `${size}px`;
          particle.style.height = `${size}px`;
          particle.style.left = `${Math.random() * 100}%`;
          particle.style.top = `${Math.random() * 100}%`;
          particle.style.setProperty('--dx', `${(Math.random() - 0.5) * 100}px`);
          particle.style.animationDelay = `${Math.random() * 4}s`;
          particle.style.animationDuration = `${Math.random() * 3 + 3}s`;
          particlesContainer.appendChild(particle);
        }
        
        // Animate loading percentage
        let percentage = 0;
        const percentageInterval = setInterval(() => {
          if (percentage < 100) {
            percentage += Math.random() * 15;
            percentage = Math.min(percentage, 100);
            if (percentageEl) {
              percentageEl.textContent = `${Math.floor(percentage)}%`;
            }
          } else {
            clearInterval(percentageInterval);
          }
        }, 150);
        
        // Function to remove boot screen
        function removeBootScreen() {
          if (!bootScreen) return;
          bootScreen.classList.add('hide');
          setTimeout(() => {
            if (bootScreen && bootScreen.parentNode) {
              bootScreen.remove();
            }
          }, 600);
        }
        
        // Check if returning user
        const hasSeenBoot = localStorage.getItem(BOOT_KEY);
        
        if (hasSeenBoot) {
          // Returning user - remove immediately
          if (bootScreen) bootScreen.remove();
          const root = document.getElementById('root');
          if (root) root.classList.add('ready');
        } else {
          // First time - show enhanced boot screen
          window.addEventListener('load', () => {
            setTimeout(() => {
              removeBootScreen();
              localStorage.setItem(BOOT_KEY, 'true');
              const root = document.getElementById('root');
              if (root) root.classList.add('ready');
            }, 2800);
          });
        }
        
        // Safety timeout
        setTimeout(() => {
          if (bootScreen && bootScreen.parentNode) {
            removeBootScreen();
            if (!localStorage.getItem(BOOT_KEY)) {
              localStorage.setItem(BOOT_KEY, 'true');
            }
          }
        }, 4000);
      })();
    </script>
  </body>
</html>
