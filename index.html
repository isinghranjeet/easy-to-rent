<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=yes" />

    <title>EassyToRent – PG & Rooms Near Chandigarh University</title>

    <link rel="icon" type="image/png" href="/ranjeet.png" />
    <link rel="manifest" href="/manifest.json" />
    <meta name="theme-color" content="#0f172a" />

    <!-- Google Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

    <!-- 🔥 BOOT SCREEN STYLES -->
    <style>
      html, body {
        margin: 0;
        padding: 0;
        background: #0f172a;
        font-family: Inter, sans-serif;
      }

      #root {
        min-height: 100vh;
        background: #0f172a;
      }

      /* BOOT SCREEN */
      #boot-screen {
        position: fixed;
        inset: 0;
        background: #0f172a;
        display: flex;
        justify-content: center;
        align-items: center;
        flex-direction: column;
        z-index: 99999;
        transition: opacity 0.4s ease;
      }

      .boot-logo img {
        width: 90px;
        height: 90px;
        border-radius: 18px;
        animation: pulse 1.5s infinite;
      }

      .boot-brand {
        color: #f97316;
        font-size: 20px;
        font-weight: 700;
        margin-top: 12px;
      }

      .boot-spinner {
        width: 26px;
        height: 26px;
        margin-top: 18px;
        border: 2px solid rgba(249,115,22,0.2);
        border-top-color: #f97316;
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }

      @keyframes spin {
        to { transform: rotate(360deg); }
      }

      @keyframes pulse {
        0% { transform: scale(1); opacity: 1; }
        50% { transform: scale(1.06); opacity: 0.7; }
        100% { transform: scale(1); opacity: 1; }
      }

      .hide {
        opacity: 0;
        pointer-events: none;
      }
    </style>
  </head>

  <body>

    <!-- 🔥 BOOT SCREEN (IMPORTANT) -->
    <div id="boot-screen">
      <div class="boot-logo">
        <img src="/ranjeet.png" alt="EassyToRent" />
        <div class="boot-brand">EassyToRent</div>
        <div class="boot-spinner"></div>
      </div>
    </div>

    <!-- React Root -->
    <div id="root"></div>

    <script type="module" src="/src/main.tsx"></script>

    <!-- 🔥 REMOVE BOOT SCREEN AFTER LOAD -->
    <script>
      window.addEventListener("DOMContentLoaded", () => {
        const boot = document.getElementById("boot-screen");

        const isFirst = !sessionStorage.getItem("boot_done");

        if (isFirst) {
          setTimeout(() => {
            boot?.classList.add("hide");

            setTimeout(() => {
              boot?.remove();
            }, 400);

            sessionStorage.setItem("boot_done", "true");
          }, 800);
        } else {
          boot?.remove();
        }
      });
    </script>

  </body>
</html>
